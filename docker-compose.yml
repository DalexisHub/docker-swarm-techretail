version: "3.8"

services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - techretail_net
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  backend:
    image: node:18-alpine
    command: sh -c "while true; do echo Backend activo; sleep 30; done"
    networks:
      - techretail_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    secrets:
      - db_password

  database:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: techretail_db
    networks:
      - techretail_net
    volumes:
      - db_data:/var/lib/mysql
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    secrets:
      - db_password

  cache:
    image: redis:7-alpine
    networks:
      - techretail_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  techretail_net:
    driver: overlay

volumes:
  db_data:

secrets:
  db_password:
    external: true

configs:
  nginx_config:
    file: ./configs/nginx.conf
